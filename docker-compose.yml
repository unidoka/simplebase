services:

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: product-service
    environment:
      DATABASE_URL: postgresql://product_user:product_pass@product-db:5432/product_db
      DEBUG: "true"
      PYTHONUNBUFFERED: 1
    ports:
      - "8001:8000"
    volumes:
      - ./services/product-service/src:/app/src
      - ./services/product-service/requirements.txt:/app/requirements.txt
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  product-db:
    image: postgres:15-alpine
    container_name: product-db
    environment:
      POSTGRES_USER: product_service_user
      POSTGRES_PASSWORD: product_service_pass
      POSTGRES_DB: product_service_db
    ports:
      - "5433:5432"  # Разные порты на хосте!
    volumes:
      - product_db_data:/var/lib/postgresql/data
    networks:
      - microservices-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U product_service_user" ]
      interval: 10s
      timeout: 5s
      retries: 5