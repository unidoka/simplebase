services:
  # === MAIN SERVICE (монолит) ===
  main-service:
    build:
      context: ./services/main-service
      dockerfile: Dockerfile
    container_name: main-service
    environment:
      # Database
      DATABASE_URL: postgresql://${MAIN_DB_USER}:${MAIN_DB_PASSWORD}@${MAIN_DB_HOST}:${MAIN_DB_PORT}/${MAIN_DB_NAME}
      # App
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      PYTHONUNBUFFERED: 1
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      API_V1_PREFIX: ${API_V1_PREFIX}
      # Redis
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
    ports:
      - "${MAIN_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./services/main-service/src:/app/src
      - ./services/main-service/requirements/requirements.txt:/app/requirements.txt
    depends_on:
      main-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # === DATABASE FOR MAIN-SERVICE ===
  main-db:
    image: postgres:15-alpine
    container_name: main-db
    environment:
      POSTGRES_USER: ${MAIN_DB_USER}
      POSTGRES_PASSWORD: ${MAIN_DB_PASSWORD}
      POSTGRES_DB: ${MAIN_DB_NAME}
    ports:
      - "${MAIN_DB_PORT:-5432}:5432"
    volumes:
      - main_db_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIN_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "${API_GATEWAY_PORT:-80}:80"
    volumes:
      - ./services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - main-service
    networks:
      - app-network
    restart: unless-stopped

volumes:
  main_db_data:
  redis_data:

networks:
  app-network:
    driver: bridge